name: run-tests

on: pull_request

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - name: Use Node.js 15.x
        uses: actions/setup-node@v1
        with:
          node-version: 15.x
      - name: Run npm install, test, and build
        run: |
          npm ci
          npm test
          npm run build
        env:
          CI: true
